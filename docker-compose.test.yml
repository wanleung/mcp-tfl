# docker-compose.test.yml
# Overrides for test profile; attaches mock API, mounts test runner, disables external routing
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml --profile test up

services:
  mcp-server:
    environment:
      APP_ENV: test
      TFL_API_BASE_URL: http://mock-tfl-api:8080
      TFL_API_TIMEOUT_MS: 2000
      CACHE_TTL_SECONDS: 5
      LOG_LEVEL: DEBUG
    ports: [] # Disable external routing for isolated test execution
    depends_on:
      mock-tfl-api:
        condition: service_healthy

  mock-tfl-api:
    build:
      context: ./mock_tfl_api
      dockerfile: Dockerfile
    container_name: mcp-tfl-mock-api
    environment:
      APP_ENV: test
      MOCK_DELAY_MS: ${MOCK_DELAY_MS:-0}
      MOCK_ERROR_RATE: ${MOCK_ERROR_RATE:-0}
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    profiles:
      - test

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-tfl-test-runner
    environment:
      APP_ENV: test
      MCP_SERVER_URL: http://mcp-server:8000
    command: ["bash", "/app/scripts/run_tests.sh"]
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - mcp-network
    profiles:
      - test