version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TESTING=true
      - LOG_LEVEL=WARNING
      - MCP_TRANSPORT=sse
      - TFL_CACHE_TTL=10
      - TFL_API_TIMEOUT=5
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: "no"