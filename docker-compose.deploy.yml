# docker-compose.deploy.yml
# Production overrides; restart policies, resource limits, healthcheck intervals, log rotation
# Usage: docker compose -f docker-compose.yml -f docker-compose.deploy.yml --profile deploy up

services:
  mcp-server:
    environment:
      APP_ENV: production
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${SERVER_PORT:-8000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - deploy